version: '3.8'

# Production-ready Docker Compose with enhanced security
services:
  # PostgreSQL Database with security hardening
  postgres:
    image: postgres:15-alpine
    container_name: ask-ya-cham-postgres-secure
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-askyacham}
      POSTGRES_USER: ${POSTGRES_USER:-askyacham_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # Security configurations
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
      - ./security/postgresql.conf:/etc/postgresql/postgresql.conf
    networks:
      - ask-ya-cham-secure
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/postgresql
    user: "999:999"  # Run as postgres user
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache with security hardening
  redis:
    image: redis:7-alpine
    container_name: ask-ya-cham-redis-secure
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --appendfsync everysec
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only
    volumes:
      - redis_data:/data
      - ./security/redis.conf:/usr/local/etc/redis/redis.conf
    networks:
      - ask-ya-cham-secure
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    user: "999:999"  # Run as redis user
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB with security hardening
  mongodb:
    image: mongo:7
    container_name: ask-ya-cham-mongodb-secure
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-askyacham_admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-askyacham_docs}
    ports:
      - "127.0.0.1:27017:27017"  # Bind to localhost only
    volumes:
      - mongodb_data:/data/db
      - ./security/mongod.conf:/etc/mongod.conf
    networks:
      - ask-ya-cham-secure
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"  # Run as mongodb user
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # API Backend with security hardening
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.prod
      args:
        NODE_ENV: production
    container_name: ask-ya-cham-api-secure
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Security configurations
      DEBUG: false
      LOG_LEVEL: warn
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 50
    ports:
      - "127.0.0.1:3001:3001"  # Bind to localhost only
    depends_on:
      - postgres
      - redis
      - mongodb
    networks:
      - ask-ya-cham-secure
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/logs
    user: "1000:1000"  # Run as non-root user
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Frontend Web App with security hardening
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
      args:
        NODE_ENV: production
    container_name: ask-ya-cham-web-secure
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    ports:
      - "127.0.0.1:3000:3000"  # Bind to localhost only
    depends_on:
      - api
    networks:
      - ask-ya-cham-secure
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/.next
    user: "1000:1000"  # Run as non-root user
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy with security hardening
  nginx:
    image: nginx:alpine
    container_name: ask-ya-cham-nginx-secure
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-secure.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/security.conf:/etc/nginx/conf.d/security.conf:ro
    depends_on:
      - web
      - api
    networks:
      - ask-ya-cham-secure
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
    user: "101:101"  # Run as nginx user
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Security monitoring service
  security-monitor:
    build:
      context: ./monitoring
      dockerfile: Dockerfile
    container_name: ask-ya-cham-security-monitor
    environment:
      MONITORING_INTERVAL: 300  # 5 minutes
      ALERT_EMAIL: ${ALERT_EMAIL}
      WEBHOOK_URL: ${WEBHOOK_URL}
    volumes:
      - ./logs:/app/logs
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ask-ya-cham-secure
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    user: "1000:1000"
    cap_drop:
      - ALL
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/postgres
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/redis
  mongodb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/mongodb

networks:
  ask-ya-cham-secure:
    driver: bridge
    internal: true  # Isolate network
    ipam:
      config:
        - subnet: 172.20.0.0/16
