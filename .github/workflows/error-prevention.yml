name: Error Prevention Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  validate-project-state:
    name: Validate Project State
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      
      - name: Validate project state
        run: npm run validate:project
      
      - name: Check for duplicate completion files
        run: |
          COMPLETION_FILES=$(find . -name "*COMPLETION*" -o -name "*FINAL*" -o -name "*ULTIMATE*" -o -name "*PERFECTION*" -o -name "*DEAD_END*" | grep -v node_modules | wc -l)
          if [ $COMPLETION_FILES -gt 3 ]; then
            echo "❌ Too many completion files found: $COMPLETION_FILES"
            find . -name "*COMPLETION*" -o -name "*FINAL*" -o -name "*ULTIMATE*" -o -name "*PERFECTION*" -o -name "*DEAD_END*" | grep -v node_modules
            exit 1
          else
            echo "✅ Completion files count acceptable: $COMPLETION_FILES"
          fi

  validate-environment:
    name: Validate Environment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install tsx
        run: npm install -g tsx
      
      - name: Validate environment configuration
        run: npm run validate:env
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-that-is-at-least-32-characters-long
          JWT_REFRESH_SECRET: test-jwt-refresh-secret-that-is-at-least-32-characters-long

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npm run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint
        run: npm run lint
      
      - name: Check formatting
        run: npm run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run tests
        run: npm run test
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: success()
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Make scripts executable
        run: chmod +x scripts/*.sh
      
      - name: Validate build
        run: npm run validate:build
      
      - name: Build all packages
        run: npm run build

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run security audit
        run: npm audit --audit-level=moderate
      
      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

  error-monitoring:
    name: Error Monitoring
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check for error patterns
        run: |
          echo "🔍 Checking for common error patterns..."
          
          # Check for console.error without proper logging
          if grep -r "console\.error" --include="*.ts" --include="*.tsx" --exclude-dir=node_modules .; then
            echo "⚠️ Found console.error usage - consider using proper logging"
          fi
          
          # Check for TODO comments
          TODO_COUNT=$(grep -r "TODO\|FIXME\|HACK" --include="*.ts" --include="*.tsx" --exclude-dir=node_modules . | wc -l)
          if [ $TODO_COUNT -gt 0 ]; then
            echo "⚠️ Found $TODO_COUNT TODO/FIXME/HACK comments"
          fi
          
          # Check for empty catch blocks
          if grep -r "catch.*{}" --include="*.ts" --include="*.tsx" --exclude-dir=node_modules .; then
            echo "⚠️ Found empty catch blocks - consider proper error handling"
          fi
      
      - name: Generate error report
        if: failure()
        run: |
          echo "📊 Error Report Generated"
          echo "========================="
          echo "Job: ${{ github.job }}"
          echo "Status: ${{ job.status }}"
          echo "Timestamp: $(date)"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"

  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Cleanup workspace
        run: |
          echo "🧹 Cleaning up workspace..."
          # Add any cleanup steps here
          echo "✅ Cleanup completed"
