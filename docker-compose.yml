version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: ask-ya-cham-postgres
    environment:
      POSTGRES_DB: askyacham
      POSTGRES_USER: askyacham_user
      POSTGRES_PASSWORD: secure_password_2024
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ask-ya-cham-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

  # MongoDB for Document Storage
  mongodb:
    image: mongo:7
    container_name: ask-ya-cham-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: askyacham_admin
      MONGO_INITDB_ROOT_PASSWORD: secure_mongo_password_2024
      MONGO_INITDB_DATABASE: askyacham_docs
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

  # Elasticsearch for Search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: ask-ya-cham-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

  # API Backend
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ask-ya-cham-api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://askyacham_user:secure_password_2024@postgres:5432/askyacham
      REDIS_URL: redis://redis:6379
      MONGODB_URL: mongodb://askyacham_admin:secure_mongo_password_2024@mongodb:27017/askyacham_docs?authSource=admin
      ELASTICSEARCH_URL: http://elasticsearch:9200
      JWT_SECRET: your-super-secure-jwt-secret-key-2024
      ENCRYPTION_KEY: your-32-character-encryption-key
    ports:
      - "3001:3001"
    depends_on:
      - postgres
      - redis
      - mongodb
      - elasticsearch
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

  # Frontend Web App
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: ask-ya-cham-web
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

  # AI Service
  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: ask-ya-cham-ai
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: postgresql://askyacham_user:secure_password_2024@postgres:5432/askyacham
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./apps/ai-service:/app
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: ask-ya-cham-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - web
      - api
    networks:
      - ask-ya-cham-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  elasticsearch_data:

networks:
  ask-ya-cham-network:
    driver: bridge
